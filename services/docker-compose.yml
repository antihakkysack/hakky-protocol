  #   depends_on: { postgres: { condition: service_healthy } }
  #
  # orchestrator:
  #   build: .
  #   command: ["npx", "tsx", "src/orchestrator/worker.ts"]
  #   env_file: .env
  #   environment: { DATABASE_URL: postgres://hakky:hakky@postgres:5432/hakky }
  #   depends_on: { postgres: { condition: service_healthy } }

volumes:
  pgdata:
